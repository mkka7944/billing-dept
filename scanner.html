<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner View | Billing Dept</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Identity -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 16px; }
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:active { background: #1d4ed8; }
        .btn-success { background: #10b981; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-unpaid { background: #fee2e2; color: #991b1b; }
        
        /* Loader */
        .loader { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin {to{transform: rotate(360deg);}}
        
        .image-carousel { display: flex; overflow-x: auto; gap: 8px; padding: 0 4px; scrollbar-width: none; }
        .image-carousel::-webkit-scrollbar { display: none; }
        .carousel-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid #e2e8f0; cursor: pointer; }
    </style>
</head>
<body class="pb-20">

    <!-- Navbar -->
    <div class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="font-bold text-slate-800 text-lg">
            <i class="fa-solid fa-qrcode text-blue-600 mr-2"></i>Scanner View
        </div>
        <div id="user-badge" class="hidden items-center gap-2">
            <span id="user-name" class="text-xs font-semibold text-slate-600 bg-slate-100 px-2 py-1 rounded"></span>
            <button onclick="Auth.logout()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-container" class="max-w-md mx-auto p-4">
        
        <!-- Loading State -->
        <div id="loader-view" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <div id="loader-text" class="text-slate-400 text-sm">Initializing...</div>
        </div>

        <!-- Not Found View -->
        <div id="error-view" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4 text-red-500 text-2xl">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            <h3 class="font-bold text-slate-700 mb-2">Result Not Found</h3>
            <p id="error-msg" class="text-slate-500 text-sm mb-6">No record matched this ID.</p>
            <a href="scanner.html?sid=" class="btn btn-primary text-sm">Scan New Code</a>
        </div>

        <!-- Result Card -->
        <div id="result-view" class="hidden">
            <!-- Inject Card Here -->
        </div>

    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-6 text-blue-600 text-3xl">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Field Staff Access</h2>
        <p class="text-slate-500 mb-8 max-w-xs">Please sign in with your authorized Google account to view survey details.</p>
        
        <!-- Google Button Container -->
        <div id="g_id_onload"
             data-client_id="296996386663-u0f57k1g5k35d0i3e7flg9pf3q152b1q.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="pill" data-logo_alignment="left"></div>
        
        <div id="auth-status" class="mt-6 text-sm text-slate-400 min-h-[20px]"></div>
    </div>

    <!-- Scripts -->
    <script>
        // --- 1. CONFIG & AUTH ---
        window.USER = null;
        window.DATA_CHUNKS_COUNT = 3; // Default assumption, creates robustness loops
        window.RAW_DATA = [];
        window.PAID_DATA = [];

        function parseJwt(token) {
            try {
                return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
            } catch(e) { return null; }
        }

        async function handleCredentialResponse(response) {
            const payload = parseJwt(response.credential);
            if (!payload) return showError("Invalid login token.");
            
            document.getElementById('auth-status').innerHTML = "Verifying access...";
            
            try {
                const rolesRes = await fetch('roles.json');
                const roles = await rolesRes.json();
                
                const isAuthorized = roles.admins.includes(payload.email) || roles.field_staff.includes(payload.email);
                if(!isAuthorized) throw new Error("Unauthorized User Email.");
                
                window.USER = { 
                    email: payload.email, 
                    role: roles.admins.includes(payload.email) ? 'admin' : 'staff',
                    name: payload.given_name || payload.name.split(' ')[0]
                };
                sessionStorage.setItem('auth_token', response.credential);
                
                // Hide Login
                document.getElementById('login-overlay').style.display = 'none';
                
                // Show User Badge
                document.getElementById('user-badge').style.display = 'flex';
                document.getElementById('user-name').innerText = window.USER.name;
                
                // Init App
                initApp();
                
            } catch(e) {
                document.getElementById('auth-status').innerHTML = `<span class="text-red-500">${e.message}</span>`;
            }
        }
        
        const Auth = {
            logout() {
                sessionStorage.removeItem('auth_token');
                window.location.reload();
            },
            async check() {
                const token = sessionStorage.getItem('auth_token');
                if(token && parseJwt(token).exp * 1000 > Date.now()) {
                    await handleCredentialResponse({ credential: token });
                }
            }
        };

        // --- 2. DATA LOADING ---
        async function fetchJSON(url) {
            const res = await fetch(url);
            if(!res.ok) throw new Error(`404 ${url}`);
            return await res.json();
        }

        async function initApp() {
            const params = new URLSearchParams(window.location.search);
            const targetSid = params.get('sid');
            
            if(!targetSid) {
                showErrorView("No Survey ID found in URL.");
                return;
            }

            setStatus(`Loading Record #${targetSid}...`);
            
            try {
                // Determine Chunks Count (robustness)
                // We'll calculate it by trying to load up to 10 parts if needed or just use default
                // Better approach: Load Parts until 404
                
                const dataPromises = [];
                // Hardcoded assumption of max 5 parts for safety
                for(let i=1; i<=5; i++) {
                    dataPromises.push(
                        fetch(`data_part${i}.json`).then(r => r.ok ? r.json() : []).catch(()=>[])
                    );
                }
                
                // Also load Paid Data
                const paidPromise = fetch('paid_data.json').then(r => r.json()).catch(()=>[]);
                
                const results = await Promise.all([...dataPromises, paidPromise]);
                const rawChunks = results.slice(0, 5);
                window.PAID_DATA = results[5] || [];
                
                // Flatten
                window.RAW_DATA = [].concat(...rawChunks);
                
                // Search
                findAndRender(targetSid);
                
            } catch(e) {
                showErrorView("Failed to load map data. Please reload.");
                console.error(e);
            }
        }

        function findAndRender(sid) {
            // Find record: Index 0 is ID
            const record = window.RAW_DATA.find(r => r[0].toString() === sid);
            
            if(!record) {
                showErrorView(`Record #${sid} not found in database.`);
                return;
            }
            
            // Found! Render Card
            renderCard(record);
        }
        
        function renderCard(r) {
            // Unpack Record (Same schema as modern-map.py)
            // 0:id, 1:lat, 2:lng, 3:is_com, 4:name, 5:addr, 6:s_name, 7:date, 
            // 8:time, 9:imgs, 10:dist, 11:teh, 12:mcuc, 13:house, 14:uct, 15:psid, ...
            
            const sid = r[0];
            const name = r[4];
            const addr = r[5];
            const imgs = r[9] || [];
            const psid = r[15];
            const p_status = r[16];
            const arrears = r[20]; // Total Payable
            
            // Paid Logic
            const isPaid = p_status.toLowerCase() === 'paid';
            const badgeClass = isPaid ? 'status-paid' : 'status-unpaid';
            const badgeText = isPaid ? 'PAID' : 'UNPAID';
            
            // Build Images HTML
            let imgHtml = '';
            if(imgs.length > 0) {
                 imgHtml = '<div class="image-carousel mt-3">';
                 imgs.forEach(url => {
                     imgHtml += `<img src="${url}" class="carousel-img" onclick="window.open('${url}', '_blank')">`;
                 });
                 imgHtml += '</div>';
            } else {
                imgHtml = '<div class="text-xs text-slate-400 mt-2 italic">No images available</div>';
            }
            
            // Google Drive Link
            const driveUrl = `https://mkka7944.github.io/Google-Drive-Sync/?sid=${sid}`;

            const html = `
                <div class="card p-4">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-wide">ID: ${sid}</div>
                            <h2 class="text-xl font-bold text-slate-800 leading-tight">${name}</h2>
                        </div>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    
                    <div class="text-sm text-slate-500 mb-4 border-b border-slate-100 pb-3">
                        <i class="fa-solid fa-location-dot mr-1 opacity-50"></i> ${addr}
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-slate-50 p-2 rounded">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Billing ID</div>
                            <div class="font-mono text-sm font-semibold">${psid}</div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded">
                            <div class="text-[10px] text-slate-400 uppercase font-bold">Total Due</div>
                            <div class="font-mono text-sm font-semibold text-red-600">PKR ${arrears}</div>
                        </div>
                    </div>
                    
                    <div class="mb-2">
                        <div class="text-xs font-bold text-slate-400 uppercase">Portal Images</div>
                        ${imgHtml}
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="card p-4">
                     <h3 class="font-bold text-slate-700 mb-3 text-sm">Field Actions</h3>
                     
                     <a href="${driveUrl}" target="_blank" class="flex items-center justify-between p-3 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors border border-blue-200 mb-3">
                        <div class="flex items-center gap-3">
                            <i class="fa-brands fa-google-drive text-blue-600 text-xl"></i>
                            <div class="text-left">
                                <div class="font-bold text-blue-900 text-sm">Upload Evidence</div>
                                <div class="text-xs text-blue-600">Sync photos to Google Drive</div>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-blue-400"></i>
                     </a>
                     
                     <a href="https://www.google.com/maps/search/?api=1&query=${r[1]},${r[2]}" target="_blank" class="flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors border border-slate-200">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-map-location-dot text-slate-600 text-xl"></i>
                            <div class="text-left">
                                <div class="font-bold text-slate-800 text-sm">Navigate</div>
                                <div class="text-xs text-slate-500">Open in Google Maps</div>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-400"></i>
                     </a>
                </div>
                
                <div class="text-center mt-6">
                    <a href="scanner.html?sid=" class="text-xs text-blue-500 font-semibold hover:underline">Scan Another Code</a>
                </div>
            `;
            
            document.getElementById('result-view').innerHTML = html;
            document.getElementById('loader-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
        }

        // --- UTILS ---
        function setStatus(msg) {
            document.getElementById('loader-text').innerText = msg;
        }

        function showErrorView(msg) {
            document.getElementById('loader-view').classList.add('hidden');
            document.getElementById('error-view').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
        }

        // --- INIT ---
        Auth.check();

    </script>
</body>
</html>
